---
- name: Create default directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 33
    group: 33
    mode: '0755'
  loop:
    - "{{ software_path }}/data"

- name: Install argon2 for password hashing
  ansible.builtin.package:
    name: argon2
    state: present

- name: Generate admin token
  ansible.builtin.shell: 'echo -n "{{ vaultwarden_admin_token }}" | /usr/bin/argon2 "$(openssl rand -base64 32)" -e -id -k 65540 -t 3 -p 4'
  vars: 
    vaultwarden_admin_token: "{{ lookup('community.general.passwordstore', 'vaultwarden/' + domain, subkey='token', missing='create') }}"
  register: vaultwarden_admin_token_hash

- name: Add custom passwordstore secrets
  debug:
    msg: "{{ lookup('community.general.passwordstore', software + '/' + domain, subkey='token_argon2', missing='create', userpass=vaultwarden_admin_token_hash.stdout) }}"

- name: Create mysql database
  community.mysql.mysql_db:
    login_user: root
    login_password: "{{ lookup('community.general.passwordstore', 'mariadb/' + software_vars.dbhost) }}"
    login_unix_socket: "/data/{{ software_vars.dbhost }}/run/mysqld/mysqld.sock"
    name: "{{ software_vars.dbname | default(service_name[:32]) }}"
    encoding: utf8
    collation: utf8_general_ci
    state: present

- name: Create mysql user
  community.mysql.mysql_user:
    login_user: root
    login_password: "{{ lookup('community.general.passwordstore', 'mariadb/' + software_vars.dbhost) }}"
    login_unix_socket: "/data/{{ software_vars.dbhost }}/run/mysqld/mysqld.sock"
    name: "{{ lookup('community.general.passwordstore', 'mariadb/' + domain, subkey='user', missing='create', nosymbols=true, length=8) }}"
    host: '%'
    column_case_sensitive: false
    password: "{{ lookup('community.general.passwordstore', 'mariadb/' + domain, subkey='passwd', missing='create', length=12) }}"
    priv: "{{ service_name[:32] }}.*:ALL"
    state: present
