---
- name: Copy nomad job to destination
  ansible.builtin.template:
    src: nomad.hcl
    dest: "/var/tmp/{{ domain }}.nomad"
    owner: root
    group: root
    mode: '0600'
  delegate_to: "{{ software.instance }}"

- name: Run nomad job
  ansible.builtin.include_role:
    name: nomad
    tasks_from: job_start.yml
