# ---
- name: Listen for events on a webhook
  hosts: all
  sources:
   - ansible.eda.webhook:
      host: 0.0.0.0
      port: 5001
    # - name: webhook_events
    #   type: webhook
    #   variables:
    #     host: "0.0.0.0"
    #     port: 8080
  rules:
    - name: Say Hello
      condition: event.i == 1
      action:
        run_playbook:
          name: ansible.eda.hello
    - name: facts
      condition: event.payload.type == "facts"
      actions:
        - run_playbook:
            name: playbooks/facts.yml

    - name: paas
      condition: event.payload.type == "paas"
      actions:
        - run_playbook:
            name: playbooks/paas/main.yml

    - name: saas-deploy
      condition: event.payload.type == "saas-deploy"
      actions:
        - run_playbook:
            name: playbooks/saas/main.yml

    - name: saas-operate
      condition: event.payload.type == "saas-operate"
      actions:
        - run_playbook:
            name: playbooks/saas/operate.yml
